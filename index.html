<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare GG 3-Day Assessment Tool</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>

    <style type="text/tailwindcss">
        @layer base {
            /* Base styles for form inputs */
            input[type="text"], textarea {
                @apply p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-150;
            }
            /* Styling for the assessment grid inputs */
            .score-input {
                @apply w-12 h-10 text-center border-gray-300 rounded focus:ring-blue-500 focus:border-blue-500;
            }
            /* Base button styles */
            .btn {
                @apply inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 transition duration-150;
            }
            .btn-primary {
                @apply text-white bg-blue-600 hover:bg-blue-700 focus:ring-blue-500;
            }
            .btn-secondary {
                @apply text-gray-700 bg-white hover:bg-gray-50 border-gray-300 focus:ring-blue-500;
            }
            .btn-danger {
                @apply text-white bg-red-600 hover:bg-red-700 focus:ring-red-500;
            }
            .btn-icon {
                @apply p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-md;
            }
        }
        /* Print-specific styles */
        @media print {
            /* Hide non-printable elements */
            .no-print {
                display: none !important;
            }
            /* Ensure the app container takes up the page */
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                margin: 0;
                padding: 0;
            }
            #root {
                margin: 0;
                padding: 0;
                box-shadow: none;
                border: none;
            }
            .print-container {
                width: 100%;
                margin: 1rem;
            }
            /* Format table for printing */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 9pt !important;
                table-layout: fixed !important;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 4px !important;
                text-align: center !important;
                overflow-wrap: break-word;
            }
            th {
                background-color: #f3f4f6 !important;
            }
            /* Hide the input boxes themselves, just show the value */
            .score-input {
                border: none !default;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                background-color: transparent !important;
                text-align: center !important;
                font-size: 9pt !important;
            }
            .print-input-value {
                display: none;
            }
            @page {
                size: letter landscape;
                margin: 0.5in;
            }
            h1, h2 {
                font-size: 14pt;
                margin-bottom: 8px;
            }
            .print-header-info {
                display: block !important;
                margin-bottom: 1rem;
                font-size: 10pt;
            }
            .print-header-info div {
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, Fragment, createContext, useContext } = React;
        const { createRoot } = ReactDOM;

        // --- Constants ---

        const ASSESSMENT_ITEMS = [
            { id: 'gg0130a', label: 'Eating', group: 'Self Care GG0130' },
            { id: 'gg0130b', label: 'Oral Hygiene', group: 'Self Care GG0130' },
            { id: 'gg0130c', label: 'Toileting Hygiene', group: 'Self Care GG0130' },
            { id: 'gg0130e', label: 'Shower/bathe self', group: 'Self Care GG0130' },
            { id: 'gg0130f', label: 'Upper body dressing', group: 'Self Care GG0130' },
            { id: 'gg0130g', label: 'Lower body dressing', group: 'Self Care GG0130' },
            { id: 'gg0130h', label: 'Putting on/taking off footwear', group: 'Self Care GG0130' },
            { id: 'gg0170a', label: 'Roll left and right', group: 'Mobility GG0170' },
            { id: 'gg0170b', label: 'Sit to lying', group: 'Mobility GG0170' },
            { id: 'gg0170c', label: 'Lying to sitting on side of bed', group: 'Mobility GG0170' },
            { id: 'gg0170d', label: 'Sit to stand', group: 'Mobility GG0170' },
            { id: 'gg0170e', label: 'Chair/bed-to-chair transfer', group: 'Mobility GG0170' },
            { id: 'gg0170f', label: 'Toilet transfer', group: 'Mobility GG0170' },
            { id: 'gg0170g', label: 'Car transfer', group: 'Mobility GG0170' },
            { id: 'gg0170i', label: 'Walk 10 feet', group: 'Mobility GG0170' },
            { id: 'gg0170j', label: 'Walk 50 feet with two turns', group: 'Mobility GG0170' },
            { id: 'gg0170k', label: 'Walk 150 feet', group: 'Mobility GG0170' },
            { id: 'gg0170r', label: 'Wheeling 150 feet', group: 'Mobility GG0170' },
        ];

        const ALLOWED_SCORES = [1, 2, 3, 4, 5, 6];
        const ANA_CODES = [7, 9, 10, 88];
        const VALID_INPUTS = [...ALLOWED_SCORES, ...ANA_CODES];

        const createInitialScores = () => {
            return ASSESSMENT_ITEMS.reduce((acc, item) => {
                acc[item.id] = Array(9).fill('');
                return acc;
            }, {});
        };

        const INITIAL_HEADER_DATA = {
            residentName: '',
            dateRange: '',
            notes: ''
        };

        // --- Scoring Logic ---

        const calculateRowScores = (inputs) => {
            const rawValues = inputs.map(val => val.trim()).filter(val => val !== '');

            if (rawValues.length === 0) {
                return { usualPerfScore: '--', anaStatus: 'Empty', hasError: false };
            }

            const numericValues = rawValues.map(Number);

            const hasError = numericValues.some(val => isNaN(val) || !VALID_INPUTS.includes(val));
            if (hasError) {
                return { usualPerfScore: 'ERR', anaStatus: 'ERROR', hasError: true };
            }

            const scoreInputs = numericValues.filter(val => ALLOWED_SCORES.includes(val));
            const anaInputs = numericValues.filter(val => ANA_CODES.includes(val));

            let anaStatus = '';
            if (scoreInputs.length > 0 && anaInputs.length > 0) {
                anaStatus = 'ANA + 1-6 mixed';
            } else if (scoreInputs.length > 0) {
                anaStatus = 'No ANA codes';
            } else if (anaInputs.length > 0) {
                anaStatus = 'ANA codes only';
            }

            let usualPerfScore = '--';

            if (anaStatus === 'ANA codes only') {
                usualPerfScore = String(Math.max(...anaInputs));
            } else if (anaStatus === 'No ANA codes' || anaStatus === 'ANA + 1-6 mixed') {
                if (scoreInputs.length > 0) {
                    const freqMap = scoreInputs.reduce((acc, val) => {
                        acc[val] = (acc[val] || 0) + 1;
                        return acc;
                    }, {});

                    const maxFreq = Math.max(...Object.values(freqMap));
                    const modes = Object.keys(freqMap)
                        .filter(key => freqMap[key] === maxFreq)
                        .map(Number);

                    const finalMode = Math.min(...modes);
                    const isTie = modes.length > 1;

                    const displayScore = String(finalMode).padStart(2, '0');
                    usualPerfScore = isTie ? `${displayScore}*` : displayScore;
                }
            }

            return { usualPerfScore, anaStatus, hasError };
        };

        // --- Context ---
        const AppContext = createContext(null);

        // --- Utility Components ---

        const Icon = ({ name, size = 16, className = '' }) => {
            const LucideIcons = window.LucideReact;
            if (LucideIcons && LucideIcons[name]) {
                return React.createElement(LucideIcons[name], { size, className });
            }
            if (LucideIcons && LucideIcons.AlertTriangle) {
                return React.createElement(LucideIcons.AlertTriangle, { size, className: `text-red-500 ${className}` });
            }
            return <span className="text-red-500">?</span>;
        };

        const Modal = ({ show, onClose, onConfirm, title, children }) => {
            if (!show) return null;
            return (
                <div
                    className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 transition-opacity no-print"
                    aria-labelledby="modal-title"
                    role="dialog"
                    aria-modal="true"
                >
                    <div className="relative bg-white rounded-lg shadow-xl w-full max-w-md m-4">
                        <div className="flex items-start justify-between p-4 border-b rounded-t">
                            <h3 className="text-lg font-semibold text-gray-900" id="modal-title">
                                {title}
                            </h3>
                            <button
                                type="button"
                                className="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center"
                                onClick={onClose}
                            >
                                <Icon name="X" size={20} />
                                <span className="sr-only">Close modal</span>
                            </button>
                        </div>
                        <div className="p-6 space-y-4">
                            {children}
                        </div>
                        <div className="flex items-center justify-end p-6 space-x-2 border-t border-gray-200 rounded-b">
                            <button onClick={onClose} type="button" className="btn btn-secondary">
                                Cancel
                            </button>
                            <button onClick={onConfirm} type="button" className="btn btn-danger">
                                Confirm
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const useCopyToClipboard = () => {
            const [copied, setCopied] = useState(false);
            const copy = useCallback((text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.top = 0;
                textArea.style.left = 0;
                textArea.style.width = "2em";
                textArea.style.height = "2em";
                textArea.style.padding = 0;
                textArea.style.border = "none";
                textArea.style.outline = "none";
                textArea.style.boxShadow = "none";
                textArea.style.background = "transparent";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                    alert('Failed to copy text.');
                }
                document.body.removeChild(textArea);
            }, []);
            return [copied, copy];
        };

        const InsightBox = ({ title, iconName, text, loading }) => {
            const [copied, copy] = useCopyToClipboard();
            return (
                <div className="bg-white p-4 rounded-lg shadow">
                    <div className="flex justify-between items-center mb-2">
                        <h3 className="text-lg font-semibold text-gray-800 flex items-center">
                            <Icon name={iconName} className="mr-2 text-blue-600" />
                            {title}
                        </h3>
                        <button
                            className="btn-icon"
                            onClick={() => copy(text)}
                            title="Copy to clipboard"
                            disabled={!text || loading}
                        >
                            {copied ? <Icon name="Check" className="text-green-500" /> : <Icon name="Clipboard" />}
                        </button>
                    </div>
                    <div className="w-full h-36 bg-gray-50 rounded-md p-2 border border-gray-200">
                        {loading ? (
                            <div className="flex items-center justify-center h-full">
                                <Icon name="Loader2" className="animate-spin text-gray-400" size={24} />
                                <span className="ml-2 text-gray-500">Generating...</span>
                            </div>
                        ) : (
                            <textarea
                                readOnly
                                value={text}
                                className="w-full h-full text-sm text-gray-700 bg-transparent border-none resize-none focus:ring-0"
                                placeholder="AI insights will appear here..."
                            />
                        )}
                    </div>
                </div>
            );
        };

        // --- Claude API Integration ---

        /**
         * Calls the Google Gemini API directly from the browser.
         * Requires a free API key from aistudio.google.com,
         * stored in localStorage under 'gg_gemini_api_key'.
         */
        const callGeminiApi = async ({ system_prompt, user_prompt }) => {
            const apiKey = localStorage.getItem('gg_gemini_api_key') || '';
            if (!apiKey) {
                throw new Error('No API key set. Click ⚙ Settings to add your Google AI Studio API key.');
            }

            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: system_prompt }] },
                        contents: [{ parts: [{ text: user_prompt }] }]
                    })
                }
            );

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `API error: ${response.status}`);
            }

            const data = await response.json();
            return { text: () => Promise.resolve(data.candidates[0].content.parts[0].text) };
        };

        /**
         * A robust fetch utility with retry logic.
         */
        const fetchWithRetry = async (apiCall, retries = 3, delay = 1000) => {
            let lastError = null;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await apiCall();
                    const text = await response.text();
                    return text;
                } catch (error) {
                    lastError = error;
                    console.warn(`API call failed (Attempt ${i + 1}/${retries}): ${error.message}`);
                    if (i < retries - 1) {
                        await new Promise(res => setTimeout(res, delay * (i + 1)));
                    }
                }
            }
            throw new Error(`API call failed after ${retries} attempts: ${lastError.message}`);
        };

        // --- Settings Panel ---

        const ApiKeySettings = () => {
            const [open, setOpen] = useState(false);
            const [key, setKey] = useState(() => localStorage.getItem('gg_gemini_api_key') || '');
            const [saved, setSaved] = useState(false);

            const handleSave = () => {
                localStorage.setItem('gg_gemini_api_key', key.trim());
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            const hasKey = !!localStorage.getItem('gg_gemini_api_key');

            return (
                <div className="mb-4 no-print">
                    <button
                        className="btn btn-secondary text-xs"
                        onClick={() => setOpen(o => !o)}
                    >
                        <Icon name="Settings" size={14} className="mr-1" />
                        Settings
                        {!hasKey && (
                            <span className="ml-2 px-1.5 py-0.5 bg-yellow-100 text-yellow-800 rounded text-xs font-medium">
                                API key needed
                            </span>
                        )}
                    </button>
                    {open && (
                        <div className="mt-2 p-4 bg-yellow-50 border border-yellow-200 rounded-md">
                            <p className="text-xs text-yellow-700 mb-3">
                                Get a free key at <strong>aistudio.google.com</strong> — no credit card required. Your key is stored only in your browser and sent directly to Google.
                            </p>
                            <div className="flex items-center gap-3">
                                <label className="text-sm font-medium text-gray-700 whitespace-nowrap">
                                    Google AI Studio Key:
                                </label>
                                <input
                                    type="password"
                                    value={key}
                                    onChange={e => setKey(e.target.value)}
                                    placeholder="AIza..."
                                    className="flex-1 text-sm"
                                    onKeyDown={e => e.key === 'Enter' && handleSave()}
                                />
                                <button className="btn btn-primary text-xs whitespace-nowrap" onClick={handleSave}>
                                    {saved ? '✓ Saved' : 'Save Key'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- Main Application Components ---

        const Header = ({ headerData, setHeaderData }) => {
            const handleChange = (e) => {
                const { name, value } = e.target;
                setHeaderData(prev => ({ ...prev, [name]: value }));
            };
            return (
                <div className="p-4 bg-white rounded-lg shadow-md mb-6 no-print">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input
                            type="text"
                            name="residentName"
                            placeholder="Name of Resident"
                            value={headerData.residentName}
                            onChange={handleChange}
                        />
                        <input
                            type="text"
                            name="dateRange"
                            placeholder="Date Range (e.g., 11/05 - 11/07)"
                            value={headerData.dateRange}
                            onChange={handleChange}
                        />
                        <input
                            type="text"
                            name="notes"
                            placeholder="Notes"
                            value={headerData.notes}
                            onChange={handleChange}
                        />
                    </div>
                </div>
            );
        };

        const ActionBar = ({ onClearClick }) => {
            return (
                <div className="flex justify-end space-x-3 mb-4 no-print">
                    <button
                        className="btn btn-secondary"
                        onClick={() => window.print()}
                    >
                        <Icon name="Printer" size={18} className="mr-2" />
                        Print / Export to PDF
                    </button>
                    <button
                        className="btn btn-danger"
                        onClick={onClearClick}
                    >
                        <Icon name="Trash2" size={18} className="mr-2" />
                        Clear All Data
                    </button>
                </div>
            );
        };

        const AssessmentRow = ({ item }) => {
            const { scores, setScores } = useContext(AppContext);
            const rowScores = scores[item.id] || [];

            const { usualPerfScore, anaStatus, hasError } = useMemo(() => {
                return calculateRowScores(rowScores);
            }, [rowScores]);

            const handleChange = (index, value) => {
                if (!/^\d{0,2}$/.test(value)) return;
                const newScores = [...rowScores];
                newScores[index] = value;
                setScores(prev => ({ ...prev, [item.id]: newScores }));
            };

            return (
                <tr className="hover:bg-gray-50">
                    <td className="sticky left-0 z-10 bg-white hover:bg-gray-50 border-r border-b px-3 py-2 text-sm font-medium text-gray-900 text-left">
                        {item.label}
                    </td>
                    {Array(9).fill(0).map((_, index) => (
                        <td key={index} className="border-b px-1 py-1">
                            <input
                                type="text"
                                maxLength="2"
                                value={rowScores[index] || ''}
                                onChange={(e) => handleChange(index, e.target.value)}
                                className="score-input"
                            />
                            <span className="hidden print:block print-input-value">
                                {rowScores[index] || '-'}
                            </span>
                        </td>
                    ))}
                    <td className={`border-b px-2 py-2 text-sm font-semibold ${hasError ? 'text-red-600' : 'text-gray-900'}`}>
                        {usualPerfScore}
                    </td>
                    <td className={`border-b px-2 py-2 text-xs ${hasError ? 'text-red-600' : 'text-gray-600'}`}>
                        {anaStatus}
                    </td>
                </tr>
            );
        };

        const AssessmentTable = () => {
            const itemsByGroup = ASSESSMENT_ITEMS.reduce((acc, item) => {
                if (!acc[item.group]) acc[item.group] = [];
                acc[item.group].push(item);
                return acc;
            }, {});

            const dayHeaders = ['Day 1', 'Day 2', 'Day 3'];
            const timeHeaders = ['AM', 'PM', 'NOC'];

            return (
                <div className="overflow-x-auto shadow-md rounded-lg">
                    <table className="min-w-full divide-y divide-gray-200 border border-gray-300">
                        <thead className="bg-gray-100">
                            <tr>
                                <th rowSpan="2" className="sticky left-0 z-20 bg-gray-100 border-r border-b px-3 py-2 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                    Assessment Item
                                </th>
                                {dayHeaders.map(day => (
                                    <th key={day} colSpan="3" className="border-b border-l px-6 py-2 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                        {day}
                                    </th>
                                ))}
                                <th rowSpan="2" className="border-b border-l px-2 py-2 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                    Usual Perf Score
                                </th>
                                <th rowSpan="2" className="border-b border-l px-2 py-2 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                    Other Codes for Evaluation
                                </th>
                            </tr>
                            <tr>
                                {Array(3).fill(0).map((_, dayIndex) => (
                                    <Fragment key={dayIndex}>
                                        {timeHeaders.map(time => (
                                            <th key={`${dayIndex}-${time}`} className="border-b border-l px-2 py-2 text-xs font-medium text-gray-500">
                                                {time}
                                            </th>
                                        ))}
                                    </Fragment>
                                ))}
                            </tr>
                        </thead>
                        <tbody className="bg-white divide-y divide-gray-200">
                            {Object.entries(itemsByGroup).map(([groupName, items]) => (
                                <Fragment key={groupName}>
                                    <tr>
                                        <td colSpan="12" className="bg-gray-200 px-3 py-2 text-sm font-bold text-gray-800">
                                            {groupName}
                                        </td>
                                    </tr>
                                    {items.map(item => (
                                        <AssessmentRow key={item.id} item={item} />
                                    ))}
                                </Fragment>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const AiInsights = ({ getSerializedData }) => {
            const [aiResult, setAiResult] = useState({
                clinicalSelfCare: '',
                clinicalMobility: '',
                carePlanSelfCare: '',
                carePlanMobility: '',
                loading: false,
                error: null,
            });

            const handleGenerateInsights = async () => {
                setAiResult({
                    clinicalSelfCare: '',
                    clinicalMobility: '',
                    carePlanSelfCare: '',
                    carePlanMobility: '',
                    loading: true,
                    error: null,
                });

                const dataSummary = getSerializedData();
                if (!dataSummary) {
                    setAiResult({
                        loading: false,
                        error: 'No data to analyze. Please enter scores first.',
                        clinicalSelfCare: '', clinicalMobility: '', carePlanSelfCare: '', carePlanMobility: ''
                    });
                    return;
                }

                try {
                    // --- Call 1: Clinical Summary (Self Care GG0130) ---
                    const clinicalSelfCarePrompt = {
                        system_prompt: "You are a clinical documentation specialist and nurse with expertise in skilled nursing facility (SNF) Medicare GG coding. Your task is to provide an objective summary of a resident's functional status. Focus ONLY on the Self Care (GG0130) items. This is not a hospital setting.",
                        user_prompt: `Here is the serialized GG 3-Day Assessment data:\n\n${dataSummary}\n\nPlease generate a summary paragraph for the Self Care (GG0130) items only. Structure your analysis by grouping items based on performance, starting with what is 'going well' (highest scores, least assistance), then 'going okay' (moderate scores), and finally 'not going well' (lowest scores, most assistance).`,
                    };

                    const summarySelfCare = await fetchWithRetry(() => callGeminiApi(clinicalSelfCarePrompt));
                    setAiResult(prev => ({ ...prev, clinicalSelfCare: summarySelfCare }));

                    // --- Call 2: Clinical Summary (Mobility GG0170) ---
                    const clinicalMobilityPrompt = {
                        system_prompt: "You are a clinical documentation specialist and nurse with expertise in skilled nursing facility (SNF) Medicare GG coding. Your task is to provide an objective summary of a resident's functional status. Focus ONLY on the Mobility (GG0170) items. This is not a hospital setting.",
                        user_prompt: `Here is the serialized GG 3-Day Assessment data:\n\n${dataSummary}\n\nPlease generate a summary paragraph for the Mobility (GG0170) items only. Structure your analysis by grouping items based on performance, starting with what is 'going well' (highest scores, least assistance), then 'going okay' (moderate scores), and finally 'not going well' (lowest scores, most assistance).`,
                    };

                    const summaryMobility = await fetchWithRetry(() => callGeminiApi(clinicalMobilityPrompt));
                    setAiResult(prev => ({ ...prev, clinicalMobility: summaryMobility }));

                    // --- Call 3: Care Plan Focus (Self Care GG0130) ---
                    const carePlanSelfCarePrompt = {
                        system_prompt: "You are an expert rehabilitation therapist (PT/OT/SLP) in a skilled nursing facility. Your goal is to identify key areas for intervention. Focus ONLY on the Self Care (GG0130) items. This is not a hospital setting.",
                        user_prompt: `Here is the serialized GG 3-Day Assessment data:\n\n${dataSummary}\n\nPlease analyze the Self Care (GG0130) items. Identify the items 'not going well' (lowest scores 1-6) and generate a bulleted list of 2-3 high-level, actionable care plan goals or focus areas for them.`,
                    };

                    const planSelfCare = await fetchWithRetry(() => callGeminiApi(carePlanSelfCarePrompt));
                    setAiResult(prev => ({ ...prev, carePlanSelfCare: planSelfCare }));

                    // --- Call 4: Care Plan Focus (Mobility GG0170) ---
                    const carePlanMobilityPrompt = {
                        system_prompt: "You are an expert rehabilitation therapist (PT/OT/SLP) in a skilled nursing facility. Your goal is to identify key areas for intervention. Focus ONLY on the Mobility (GG0170) items. This is not a hospital setting.",
                        user_prompt: `Here is the serialized GG 3-Day Assessment data:\n\n${dataSummary}\n\nPlease analyze the Mobility (GG0170) items. Identify the items 'not going well' (lowest scores 1-6) and generate a bulleted list of 2-3 high-level, actionable care plan goals or focus areas for them.`,
                    };

                    const planMobility = await fetchWithRetry(() => callGeminiApi(carePlanMobilityPrompt));
                    setAiResult(prev => ({ ...prev, carePlanMobility: planMobility, loading: false }));

                } catch (err) {
                    console.error("AI Insight Generation Failed:", err);
                    setAiResult({
                        clinicalSelfCare: '', clinicalMobility: '', carePlanSelfCare: '', carePlanMobility: '',
                        loading: false,
                        error: `Failed to generate insights: ${err.message}`
                    });
                }
            };

            return (
                <div className="mt-8 p-6 bg-gray-50 rounded-lg shadow-md no-print">
                    <h2 className="text-xl font-semibold text-gray-900 mb-4">
                        AI-Powered Insights
                    </h2>

                    <button
                        className="btn btn-primary"
                        onClick={handleGenerateInsights}
                        disabled={aiResult.loading}
                    >
                        {aiResult.loading ? (
                            <>
                                <Icon name="Loader2" size={18} className="mr-2 animate-spin" />
                                Generating...
                            </>
                        ) : (
                            <>
                                <Icon name="Sparkles" size={18} className="mr-2" />
                                Generate Comprehensive AI Insights
                            </>
                        )}
                    </button>

                    {aiResult.error && (
                        <div className="mt-4 p-3 bg-red-100 border border-red-300 text-red-800 rounded-md">
                            <strong>Error:</strong> {aiResult.error}
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                        <InsightBox
                            title="Clinical Summary: Self Care"
                            iconName="FileText"
                            text={aiResult.clinicalSelfCare}
                            loading={aiResult.loading && !aiResult.clinicalSelfCare}
                        />
                        <InsightBox
                            title="Clinical Summary: Mobility"
                            iconName="FileText"
                            text={aiResult.clinicalMobility}
                            loading={aiResult.loading && !aiResult.clinicalMobility}
                        />
                        <InsightBox
                            title="Care Plan Focus: Self Care"
                            iconName="Target"
                            text={aiResult.carePlanSelfCare}
                            loading={aiResult.loading && !aiResult.carePlanSelfCare}
                        />
                        <InsightBox
                            title="Care Plan Focus: Mobility"
                            iconName="Target"
                            text={aiResult.carePlanMobility}
                            loading={aiResult.loading && !aiResult.carePlanMobility}
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [scores, setScores] = useState(createInitialScores());
            const [headerData, setHeaderData] = useState(INITIAL_HEADER_DATA);
            const [showClearModal, setShowClearModal] = useState(false);

            useEffect(() => {
                try {
                    const savedScores = localStorage.getItem('ggScores');
                    const savedHeader = localStorage.getItem('ggHeader');
                    if (savedScores) setScores(JSON.parse(savedScores));
                    if (savedHeader) setHeaderData(JSON.parse(savedHeader));
                } catch (e) {
                    console.error("Failed to load data from localStorage", e);
                }
            }, []);

            useEffect(() => {
                try {
                    localStorage.setItem('ggScores', JSON.stringify(scores));
                } catch (e) {
                    console.error("Failed to save scores to localStorage", e);
                }
            }, [scores]);

            useEffect(() => {
                try {
                    localStorage.setItem('ggHeader', JSON.stringify(headerData));
                } catch (e) {
                    console.error("Failed to save header to localStorage", e);
                }
            }, [headerData]);

            const handleClearData = () => {
                setScores(createInitialScores());
                setHeaderData(INITIAL_HEADER_DATA);
                localStorage.removeItem('ggScores');
                localStorage.removeItem('ggHeader');
                setShowClearModal(false);
            };

            const getSerializedDataForAi = useCallback(() => {
                let hasData = false;
                const lines = [];
                lines.push(`Resident: ${headerData.residentName || 'N/A'}`);
                lines.push(`Date Range: ${headerData.dateRange || 'N/A'}`);
                lines.push(`Notes: ${headerData.notes || 'N/A'}`);
                lines.push('--- Assessment Data ---');

                ASSESSMENT_ITEMS.forEach(item => {
                    const rowScores = scores[item.id] || [];
                    const { usualPerfScore, anaStatus, hasError } = calculateRowScores(rowScores);
                    if (anaStatus !== 'Empty') {
                        hasData = true;
                        lines.push(
                            `[${item.label} (${item.id})]: Usual Perf Score: ${usualPerfScore} | ANA Status: ${anaStatus} ${hasError ? '| (ERROR)' : ''}`
                        );
                    }
                });

                return hasData ? lines.join('\n') : null;
            }, [scores, headerData]);

            return (
                <AppContext.Provider value={{ scores, setScores }}>
                    <div className="max-w-screen-2xl mx-auto bg-white p-4 md:p-8 rounded-xl shadow-2xl border border-gray-200 print-container">

                        {/* Printable Header Info */}
                        <div className="hidden print:block print-header-info">
                            <h1 className="text-xl font-bold">Medicare GG 3-Day Assessment</h1>
                            <div><strong>Resident:</strong> {headerData.residentName || 'N/A'}</div>
                            <div><strong>Date Range:</strong> {headerData.dateRange || 'N/A'}</div>
                            <div><strong>Notes:</strong> {headerData.notes || 'N/A'}</div>
                        </div>

                        <h1 className="text-2xl font-bold text-gray-900 mb-4 no-print">
                            Medicare GG 3-Day Assessment Tool
                        </h1>

                        <ApiKeySettings />

                        <Header headerData={headerData} setHeaderData={setHeaderData} />

                        <ActionBar onClearClick={() => setShowClearModal(true)} />

                        <AssessmentTable />

                        <AiInsights getSerializedData={getSerializedDataForAi} />

                        <Modal
                            show={showClearModal}
                            onClose={() => setShowClearModal(false)}
                            onConfirm={handleClearData}
                            title="Clear All Assessment Data?"
                        >
                            <p className="text-base leading-relaxed text-gray-600">
                                Are you sure you want to clear all data? This action cannot be undone and will remove all entered scores and resident information.
                            </p>
                        </Modal>
                    </div>
                </AppContext.Provider>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);

    </script>

</body>
</html>
